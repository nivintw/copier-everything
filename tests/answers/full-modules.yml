# Shape: a package with every module enabled (terraform + docker + helm + sql + ansible) —
# exercises the module scaffolding's REUSE/header compliance, the helm check-yaml exclusion,
# and the Python + Ansible-collection combination (release-please bumps both pyproject and
# galaxy.yml; ansible-lint runs alongside the Python gate).
project_name: Full Modules
project_description: every module enabled
test_frameworks: [pytest]
contains_python: true
python_source: true
is_package: true
include_terraform: true
include_docker: true
include_helm: true
include_sql: true
sql_dialect: postgres
sql_use_dbt: false
include_devcontainer: true
contains_ansible: true
ansible_kind: collection
