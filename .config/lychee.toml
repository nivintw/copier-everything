# lychee link-checker config for the copier-everything repo ITSELF. Mirrors the
# template/.config/lychee.toml.jinja shape (generated repos get their own). Excludes live here,
# not inline in link-check.yml, so repo-specific hosts have a clean home; the workflow passes
# only `--config .config/lychee.toml` so all excludes share one source.
exclude = [
  # GitHub Pages site: the README links to it but it only goes live after a docs change merges
  # (Pages deploys from main /docs), so checking it on the PR 404s.
  "nivintw\\.github\\.io/copier-everything",
  # our own /compare/ URLs: release-please's CHANGELOG links to compare/<prev>...<next>; the
  # <next> tag isn't cut until the Release PR merges, so it 404s on every Release PR (self-heals).
  "github\\.com/nivintw/copier-everything/compare/",
  # The REUSE badge's /info/ endpoint 404s until the repo is registered/crawled by reuse.software.
  "api\\.reuse\\.software/info/",
  # Documentation universals — shared with the template's baseline (test_synced_files keeps the
  # template's excludes a subset of this repo's).
  # Loopback / local-dev hosts that never resolve in CI.
  "^https?://(localhost|127\\.0\\.0\\.1)([:/]|$)",
  # RFC 2606 reserved example domains — placeholders, never real links.
  "^https?://([^/@]+\\.)?example\\.(com|org|net)([:/]|$)",
  # A not-yet-published private GitHub Pages site — REQUIRES a subdomain label (`x.pages.github.io`),
  # so the bare `pages.github.io` (GitHub's Pages home/docs) still gets link-checked. The `([:/]|$)`
  # boundary after `pages.github.io` keeps a spoof host like `evil-pages.github.io.attacker.com` out.
  "^https?://[^/@]+\\.pages\\.github\\.io([:/]|$)",
]
