# hawkeye (https://github.com/korandoru/hawkeye) maintains SPDX headers on THIS repo's own
# files (run: `hawkeye format`, or `check`). The header text is templated from [properties]
# so year/holder/license live in one place. The template/ tree is excluded: its .jinja
# files carry render-deliberate SPDX headers + EOF that hawkeye must not rewrite — reuse
# covers them via REUSE.toml's override. Markdown keeps its existing HTML-comment headers
# (reuse-verified), so it stays in hawkeye's default excludes.

# REUSE-IgnoreStart — this file literally contains an SPDX-License-Identifier line; without
# the guard, `reuse lint` tries to parse the placeholder below as a license.
inlineHeader = """
SPDX-FileCopyrightText: © {{ props["inceptionYear"] }} {{ props["copyrightHolder"] }}
SPDX-License-Identifier: {{ props["spdxLicenseIdentifier"] }}
"""
# REUSE-IgnoreEnd

excludes = [
  "LICENSE",
  "LICENSES/**",
  "uv.lock",
  "**/*.json",
  # renovate.json5 carries its own `//` SPDX header (reuse-verified); hawkeye has no json5 map.
  "**/*.json5",
  # CODEOWNERS has no extension hawkeye maps; it carries its own `#` header (reuse-verified).
  # Not present in this repo's own tree yet — nivintw/repo-management's automation adds one —
  # kept ready for when it lands rather than dropped and re-added later. (The general policy
  # for entries like this: keep when there's a concrete future reason the content reappears,
  # drop when there's none — e.g. .config/lychee.toml's exclude list drops an ignore-pattern
  # whose only source, REVIEW.md, this repo permanently deleted.)
  "**/CODEOWNERS",
  # The Copier template tree — its headers resolve at render time (see REUSE.toml).
  "template/**",
]

# '#'-comment files hawkeye doesn't map by default. .envrc is this repo's own root .envrc;
# .dockerignore is kept defensively for if Docker tooling is ever added at the root (mirrors
# the generated template's own .dockerignore, which this repo doesn't otherwise need).
# (.gitignore stays in hawkeye's default excludes and is licensed via REUSE.toml instead.)
[mapping.SCRIPT_STYLE]
extensions = ["txt", "fish", "bats"]
filenames = [".envrc", ".dockerignore"]

[properties]
inceptionYear = "2026"
spdxLicenseIdentifier = "MIT"
copyrightHolder = "Tyler Nivin"
