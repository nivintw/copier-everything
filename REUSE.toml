version = 1

# The Jinja template tree (template/**) carries SPDX headers whose `{{ license }}`
# placeholders only resolve at render time. `precedence = "override"` makes reuse use the
# license declared here instead of trying to parse those placeholders as SPDX expressions.
# The rendered output's real headers are verified per-shape by tests/render-matrix.sh.
[[annotations]]
path = "template/**"
precedence = "override"
SPDX-FileCopyrightText = "© 2026 Tyler Nivin"
SPDX-License-Identifier = "MIT"

# .gitignore files stay in hawkeye's default excludes (not re-included via a negation) and are
# licensed here instead of via an inline header — both the root one and any nested ones (e.g.
# tool config dirs like .serena/ that ship their own ignore file).
[[annotations]]
path = [".gitignore", "**/.gitignore"]
SPDX-FileCopyrightText = "© 2026 Tyler Nivin"
SPDX-License-Identifier = "MIT"

# JSON has no comment syntax for an inline SPDX header (release-please's config + manifest).
[[annotations]]
path = ["**/*.json"]
SPDX-FileCopyrightText = "© 2026 Tyler Nivin"
SPDX-License-Identifier = "MIT"

# uv.lock is generated by `uv`, which rewrites it wholesale — a hand-added header wouldn't
# survive, so it's licensed here (the generated projects do the same; see test_synced_files).
[[annotations]]
path = ["uv.lock"]
SPDX-FileCopyrightText = "© 2026 Tyler Nivin"
SPDX-License-Identifier = "MIT"

# CHANGELOG.md is rewritten by release-please on every release, which only manages content
# below the `# Changelog` heading — a hand-added header above it isn't rewritten today, but
# isn't a guarantee either, and an earlier hand-placed header here already went "orphaned"
# once release-please's insertions pushed it down over many releases. Licensed here instead,
# like uv.lock, so it survives whatever release-please does to the file.
[[annotations]]
path = ["CHANGELOG.md"]
SPDX-FileCopyrightText = "© 2026 Tyler Nivin"
SPDX-License-Identifier = "MIT"

# The favicon is a graphic asset, not a text file hawkeye can header inline. Mirrors the
# template's own docs/assets/favicon.svg, which is untemplated and carries no inline header
# for the same reason (see template/REUSE.toml.jinja).
[[annotations]]
path = "docs/assets/favicon.svg"
SPDX-FileCopyrightText = "© 2026 Tyler Nivin"
SPDX-License-Identifier = "MIT"
