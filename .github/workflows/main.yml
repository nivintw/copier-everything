# Main pipeline: on every push to main, run the SAME quality gate as PRs (ci.yml), then —
# only here, and only if the gate is green — the release-please stage.
#
# RELEASE FLOW (release-please, manifest mode, separate-pull-requests: true, release-type
# `simple` → bare `vX.Y.Z` tags; this repo declares a single package, so it's the N=1 case
# of the same generic mechanism the template scaffolds — see issue #198):
#   1. On push to main, release-please maintains a Release PR that bumps the version +
#      CHANGELOG.md.
#   2. Every open Release PR is AUTO-MERGED (`--auto --rebase`) the moment its required
#      checks pass, so releases are continuous: release-please then cuts the `vX.Y.Z` tag +
#      GitHub Release. Copier consumers pin a release with `copier copy --vcs-ref vX.Y.Z` /
#      `copier update`.
#   3. The release job gates on `needs: [ci, preflight]`, so a tag is never cut on a red
#      gate. The `ci` job here reuses ci.yml — the exact gate PRs run.
#
# Auth: a release GitHub App, NOT the default GITHUB_TOKEN — an App token is a distinct
# actor, so the Release PR runs CI and (because the auto-merge is performed as the App)
# merging it triggers this workflow again to cut the tag + release. The release SKIPS
# cleanly until the App's CI_CLIENT_ID (variable) + CI_APP_PRIVATE_KEY (secret) exist (see
# the preflight job), so pushing to main is always safe.
#
# REPO SETTINGS the auto-merge depends on (managed centrally for this repo):
#   - "Allow auto-merge" enabled, and "Allow rebase merging" (this repo's only merge method;
#     the auto-merge step uses `--rebase` to match).
#   - The App (Contents + Pull requests: read/write) in the bypass list of the ruleset
#     protecting main. That ruleset must gate releases on REQUIRED STATUS CHECKS; `--auto`
#     also needs at least one required check to exist, or it errors. A required approving
#     review works only with approve-bot-prs.yml configured (its CI_APP_SLUG variable + the
#     "create and approve pull requests" Actions setting): the App authored the Release PR
#     and GitHub forbids approving your own PR, so without that workflow a required review
#     deadlocks auto-merge.

name: main

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

# Serialize release runs so overlapping merges can't race release-please.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # The same gate PRs run. The caller job is named `ci` so its check-runs report as
  # `ci / <job>` — matching what the ruleset requires and what PRs produce via pr.yml.
  ci:
    uses: ./.github/workflows/ci.yml

  # Guard: the release job needs the App's Client ID + private key. A secret can't be read
  # in a job-level `if:`, so a step (which CAN see them) reports whether BOTH are present,
  # and the release job gates on that output. Until both are set, release SKIPS cleanly
  # (green run, no failure); set them and auto-release activates itself.
  preflight:
    runs-on: ubuntu-latest
    outputs:
      release_enabled: ${{ steps.check.outputs.enabled }}
    steps:
      - id: check
        env:
          CI_CLIENT_ID: ${{ vars.CI_CLIENT_ID }}
          CI_APP_PRIVATE_KEY: ${{ secrets.CI_APP_PRIVATE_KEY }}
        run: |
          missing=""
          [ -z "$CI_CLIENT_ID" ] && missing="$missing CI_CLIENT_ID(variable)"
          [ -z "$CI_APP_PRIVATE_KEY" ] && missing="$missing CI_APP_PRIVATE_KEY(secret)"
          if [ -z "$missing" ]; then
            echo "enabled=true" >>"$GITHUB_OUTPUT"
          else
            echo "enabled=false" >>"$GITHUB_OUTPUT"
            echo "::notice::Release skipped — missing:$missing. Set them to enable auto-release."
          fi

  release:
    needs: [ci, preflight]
    if: needs.preflight.outputs.release_enabled == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Mint a token for the release App (the ruleset bypass actor)
        id: app-token
        uses: actions/create-github-app-token@fee1f7d63c2ff003460e3d139729b119787bc349 # v2.2.2
        with:
          # `app-id` accepts the App's Client ID as well as the numeric App ID
          # (create-github-app-token supports both); the Client ID is non-secret, hence a var.
          app-id: ${{ vars.CI_CLIENT_ID }}
          private-key: ${{ secrets.CI_APP_PRIVATE_KEY }}
          # Scope the token to exactly what release-please needs: the bump commit + tag +
          # release (contents) and the Release PR (pull-requests).
          permission-contents: write
          permission-pull-requests: write

      - name: Run release-please (Release PRs, tags, releases)
        id: release
        uses: googleapis/release-please-action@5c625bfb5d1ff62eadeeb3772007f7f66fdcf071 # v4.4.1
        with:
          token: ${{ steps.app-token.outputs.token }}
          config-file: .config/release-please-config.json
          manifest-file: .config/.release-please-manifest.json

      # release-please's default changelog renderer normalizes EVERY issue reference in a
      # bundled commit (a `Refs #N`, a bare `#N`, anything) into a `closes #N` entry in the
      # Release PR body — regardless of the keyword the author actually used. When this PR
      # auto-merges below, GitHub's native parser would then close every one of those issues,
      # including ones a commit merely *referenced*. The genuine closes already fired from the
      # feature PRs at their own merge time, so the Release PR body's closing keywords are all
      # redundant here: defuse them before auto-merge by rewriting any closing keyword that
      # precedes an issue reference to the non-keyword "refs". Only the PR BODY is touched (what
      # GitHub parses for auto-close); CHANGELOG.md keeps its `closes [#N]` links, since GitHub
      # never parses the changelog. Runs every push right after release-please regenerates the
      # body, so the body is always defused at the moment auto-merge lands it. `prs` travels via
      # env (never inline `${{ }}`), same as the auto-merge step.
      - name: Defuse closing keywords in the Release PR bodies (don't auto-close referenced issues)
        if: ${{ steps.release.outputs.prs && steps.release.outputs.prs != '[]' }}
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          GH_REPO: ${{ github.repository }}
          RELEASE_PRS: ${{ steps.release.outputs.prs }}
        run: |
          set -euo pipefail
          # A closing keyword sitting directly before an issue reference — every shape GitHub's
          # native auto-close acts on: `#N` / `[#N]` (what release-please emits), a `GH-N`, a
          # cross-repo `owner/repo#N`, or a full issues URL. Used twice below: the perl rewrite
          # neutralizes the `#N`/`[#N]` forms release-please actually produces (plus an optional
          # `:` trailer), and this same pattern is the CANARY that fails the step loud if ANY
          # closing keyword+ref survives the rewrite — a form we don't cover, or a future
          # release-please format change — rather than letting auto-merge wrongly close a
          # merely-referenced issue. Matched with perl below (not grep -E, whose `\b` support
          # isn't portable), so `\b`/`[[:space:]]` behave the same everywhere.
          close_ref='\b(clos(e|es|ed)|fix(es|ed)?|resolv(e|es|ed))\b:?[[:space:]]+(\[?#[0-9]|GH-[0-9]|[A-Za-z0-9._-]+/[A-Za-z0-9._-]+#[0-9]|https?://[^[:space:]]+/issues/[0-9])'
          # Capture jq's output first (not `jq | while`) so a jq failure trips set -e loudly
          # instead of being swallowed by the pipe (same rationale as the auto-merge step below).
          numbers="$(printf '%s' "$RELEASE_PRS" | jq -r '.[].number')"
          for num in $numbers; do
            body="$(gh pr view "$num" --json body --jq '.body')"
            # Rewrite each closing keyword (close/closes/closed, fix/fixes/fixed,
            # resolve/resolves/resolved), with an optional `:` trailer, that immediately precedes a
            # `#N` or `[#N]` reference to the non-keyword "refs". \b stops it mangling words like
            # "prefixes"; only a keyword+ref pair is touched, so the PR's own `([#N])` self-link
            # (no keyword) is left intact. Body passed via --body-file on stdin, never interpolated.
            defused="$(printf '%s' "$body" | perl -0777 -pe 's/\b(clos(?:e|es|ed)|fix(?:es|ed)?|resolv(?:e|es|ed))\b:?(\s+\[?#\d)/refs$2/gi')"
            if [ "$defused" != "$body" ]; then
              printf '%s' "$defused" | gh pr edit "$num" --body-file -
              echo "Defused closing keywords in Release PR #${num} (referenced issues won't auto-close on merge)."
            fi
            # CANARY: after the rewrite, no closing keyword may still sit before an issue reference.
            # If one survives, FAIL LOUD — the erroring step makes the `if:`-less auto-merge step
            # below skip (it's implicitly `success()`-gated), so the Release PR is left open for a
            # human instead of auto-closing a referenced issue. Checked with perl (grep -E's `\b`
            # isn't portable); perl exits 0 on a match. The pattern travels via the environment so
            # its own `/` characters can't break the match delimiter.
            if printf '%s' "$defused" | CLOSE_REF="$close_ref" perl -0777 -ne 'exit($_ =~ /$ENV{CLOSE_REF}/i ? 0 : 1)'; then
              echo "::error::Release PR #${num} still has a closing keyword before an issue reference after defusing (an unhandled form, or a release-please format change). Refusing to auto-merge and wrongly close a referenced issue — update the defuse step's regex." >&2
              exit 1
            fi
          done

      # Continuous release: when release-please opens/updates a Release PR, enable
      # auto-merge so it lands (rebase) once required checks pass — no standing PR, no
      # manual step. Because separate-pull-requests is on, release-please emits `prs` (a
      # JSON array of every Release PR touched this run) rather than the singular `pr` —
      # iterating it is what makes this generic, matching the template's own mechanism
      # (issue #198), even though this repo only ever declares one package. On the next
      # run (a release was cut, no PR) `prs` is unset and this skips. PR JSON travels via
      # env, never inline `${{ }}`, to dodge script injection. GH_REPO tells gh which repo
      # to act on: this job has no checkout, so without it `gh pr merge` probes the working
      # dir for a git remote and dies ("not a git repository"). gh reads GH_REPO natively,
      # so no `actions/checkout` is needed.
      # `!= '[]'` is defensive belt-and-suspenders, not load-bearing today: verified against
      # release-please-action v4.4.1's source that `prs` is only ever set (never to `"[]"`)
      # when at least one PR exists — but the action isn't pinned by version, just by commit
      # SHA that Renovate bumps, so this guards against a future release changing that.
      - name: Auto-merge the Release PRs
        if: ${{ steps.release.outputs.prs && steps.release.outputs.prs != '[]' }}
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          GH_REPO: ${{ github.repository }}
          RELEASE_PRS: ${{ steps.release.outputs.prs }}
        run: |
          set -euo pipefail
          # Capture jq's output first (not `jq | while`): under `set -e` a jq failure (null /
          # non-array `prs`) aborts the step loudly instead of being swallowed by the pipe and
          # silently enabling auto-merge on nothing.
          numbers="$(printf '%s' "$RELEASE_PRS" | jq -r '.[].number')"
          for num in $numbers; do
            gh pr merge "$num" --auto --rebase
          done
