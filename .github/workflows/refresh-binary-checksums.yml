# Keep each CI binary's pinned *_SHA256 in sync with its *_VERSION on Renovate PRs.
# Renovate bumps the version env vars but can't update a github-release asset's SHA256
# (github-releases has no asset-digest datasource), so CI would fail closed on the now-stale
# hash. This recomputes the hashes (scripts/refresh-binary-checksums.sh) and pushes the fix
# back to the Renovate branch AS THE RELEASE APP, so the push re-triggers CI (a push made
# with the default GITHUB_TOKEN would not). When the App isn't configured the job skips and
# the fail-closed mismatch stands — re-pin by hand with the script, then commit.
#
# Supply-chain safety: the script runs with BASE_REF set, so it only re-pins a tool whose
# *_VERSION actually changed vs the default branch. A SHA that changed WITHOUT a version bump
# (a swapped release asset on a fixed tag) fails the job instead of being auto-accepted.

name: refresh-binary-checksums

on:
  push:
    branches: ["renovate/**"]
    paths:
      - ".github/workflows/**"
      - "template/.github/workflows/**"

permissions:
  contents: read

# One refresh per branch; serialize so two near-simultaneous Renovate pushes can't race the
# commit/push back.
concurrency:
  group: refresh-checksums-${{ github.ref }}
  cancel-in-progress: false

jobs:
  refresh:
    # Skips cleanly when the release App isn't set up (falls back to fail-closed pins).
    if: vars.CI_CLIENT_ID != ''
    runs-on: ubuntu-latest
    steps:
      - name: Mint a token for the release App (so the push re-triggers CI)
        id: app-token
        uses: actions/create-github-app-token@fee1f7d63c2ff003460e3d139729b119787bc349 # v2.2.2
        with:
          app-id: ${{ vars.CI_CLIENT_ID }}
          private-key: ${{ secrets.CI_APP_PRIVATE_KEY }}
          permission-contents: write

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ github.ref_name }}
          # Don't leave the App token in .git/config while the refresh script runs (zizmor
          # artipacked); the final step pushes with an explicit tokenized remote instead.
          persist-credentials: false

      - name: Refresh pinned checksums to match the bumped versions
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          set -euo pipefail
          # Fetch the default branch (auth via token, not persisted) so the tamper gate can
          # tell a real version bump from a SHA swapped under an unchanged version.
          git fetch --no-tags --depth=1 \
            "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}" \
            "${DEFAULT_BRANCH}:refs/remotes/origin/${DEFAULT_BRANCH}"
          BASE_REF="origin/${DEFAULT_BRANCH}" scripts/refresh-binary-checksums.sh

      - name: Commit + push any checksum updates
        env:
          APP_SLUG: ${{ steps.app-token.outputs.app-slug }}
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          BRANCH: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          if git diff --quiet; then
            echo "Checksums already current — nothing to push."
            exit 0
          fi
          git config user.name "${APP_SLUG}[bot]"
          git config user.email "${APP_SLUG}[bot]@users.noreply.github.com"
          git add -A
          git commit -m "chore(deps): refresh pinned binary checksums"
          git push "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}" "HEAD:${BRANCH}"
