# Copier configuration for the `copier-everything` project template.
# Generate a new project with:  copier copy --trust gh:nivintw/copier-everything path/to/new-project
# (--trust lets the post-copy tasks run git init / uv sync / prek install for you.)
# Docs: https://copier.readthedocs.io

_subdirectory: template
_answers_file: .copier-answers.yml
_min_copier_version: "9.0.0"

# Strip the `.jinja` suffix on render (default, stated for clarity).
_templates_suffix: .jinja

# Drop the license texts the project didn't choose from the OUTPUT, so `reuse lint`
# doesn't flag an unused license. Both files stay in the template source (LICENSE.jinja
# `{% raw %}{% include %}{% endraw %}`s the Apache text), they just aren't copied. The
# first entries restore Copier's defaults (setting _exclude replaces them).
_exclude:
  - "copier.yml"
  - "copier.yaml"
  - "~*"
  - "*.py[co]"
  - "__pycache__"
  - ".git"
  - ".DS_Store"
  - ".svn"
  - "{% if license != 'MIT' %}LICENSES/MIT.txt{% endif %}"
  - "{% if license != 'Apache-2.0' %}LICENSES/Apache-2.0.txt{% endif %}"

# Post-copy setup. Only runs with `copier copy --trust`; the message below lists the
# same steps for anyone who skips trust. Each task is gated to the initial copy. The three
# repo-INITIALIZING tasks (git init / git add / scaffold commit) additionally gate on
# `initialize_repository` so they're skipped when adopting into an existing repo (which
# already has git + real history) — see docs/adopting-into-an-existing-repo.md. `uv sync` and
# `prek install` keep the plain copy gate (idempotent, useful in both greenfield and adoption)
# — but `prek install` is guarded to no-op without a git repo, since installing hooks needs a
# .git, which `initialize_repository: false` into a not-yet-init'd dir wouldn't have created.
_tasks:
  - command: ["git", "init", "-q"]
    when: "{{ _copier_operation == 'copy' and initialize_repository }}"
  - command: ["uv", "sync"]
    when: "{{ _copier_operation == 'copy' and has_python }}"
  # No Ansible Galaxy install runs here on purpose: the scaffolded requirements.yml ships empty,
  # so `ansible-galaxy install` would only pull ansible-core to do nothing. Run it yourself once
  # you add collections/roles (README's Ansible section has the command); CI installs them
  # before the lint gate.
  - command: ["git", "add", "-A"]
    when: "{{ _copier_operation == 'copy' and initialize_repository }}"
  # The initial commit runs BEFORE prek install on purpose: the no-commit-to-branch hook
  # would otherwise block the first commit to main. Identity comes from the answers so it
  # works even without a global git config. The `git diff --cached --quiet ||` guard makes
  # the task idempotent: copying into an EXISTING repo where nothing ended up staged (e.g.
  # a re-run) would otherwise make `git commit` exit non-zero and fail the whole task.
  # A string command (not a list) so the shell evaluates the `||`. author_name/email land
  # inside a double-quoted shell word, so escape backslash then double-quote (in that order)
  # to stay robust to identities like `Jane "JJ" Doe`; project_slug is already validated to
  # dashes/lowercase, so it needs none.
  - command: >-
      git diff --cached --quiet ||
      git -c user.name="{{ author_name | replace('\\', '\\\\') | replace('"', '\\"') }}"
      -c user.email="{{ author_email | replace('\\', '\\\\') | replace('"', '\\"') }}"
      commit -q -m "chore: scaffold {{ project_slug }}"
    when: "{{ _copier_operation == 'copy' and initialize_repository }}"
  # Guarded on git presence: greenfield has just run `git init`, and an adopted repo already
  # has `.git`, but adoption into a not-yet-init'd dir (initialize_repository: false) has none —
  # there, hook install is a no-op, not a hard failure. An `if/then/else` (not `… || echo`) so a
  # GENUINE prek-install failure on a real repo still propagates instead of being masked.
  - command: >-
      if git rev-parse --is-inside-work-tree >/dev/null 2>&1; then
      uvx prek install;
      else echo "skipping prek install — no git repo yet (run it after you init/commit)";
      fi
    when: "{{ _copier_operation == 'copy' }}"

# Shown only after `copier copy` (update has its own _message_after_update), and
# `_copier_operation` isn't in scope in this message context — so branch on
# initialize_repository (greenfield vs adoption) rather than on the operation.
_message_after_copy: |
  "{{ project_name }}" scaffolded.

  {% if initialize_repository -%}
  If you ran without --trust, finish setup manually (commit BEFORE installing hooks —
  main is protected by no-commit-to-branch):
    cd {{ _copier_conf.dst_path }}
    git init
  {%- if has_python %}
    uv sync               # venv + dev toolchain
  {%- endif %}
    git add -A && git commit -m "chore: scaffold {{ project_slug }}"
    uvx prek install      # wire up the pre-commit hooks
  {% else -%}
  Adopted into an existing repo (initialize_repository=false): git init + the scaffold commit
  were skipped. Reconcile the scaffold against your real files, then commit on your own branch
  — see docs/adopting-into-an-existing-repo.md.{% if has_python %} Run `uv sync` for the dev
  toolchain and{% endif %} `uvx prek install` to wire up the hooks when ready.
  {% endif -%}

# ----------------------------------------------------------------------------- #
#  Project identity
# ----------------------------------------------------------------------------- #
project_name:
  type: str
  help: Human-readable project name (e.g. "My Service")
  placeholder: My Project

project_slug:
  type: str
  help: Machine name — used for dirs, package, and repo
  default: "{{ project_name | lower | replace(' ', '-') | replace('_', '-') }}"
  validator: >-
    {% if not project_slug %}project_slug cannot be empty.
    {% elif project_slug != (project_slug | lower) or ' ' in project_slug or '_' in project_slug %}
    project_slug must be lowercase, with dashes instead of spaces or underscores.
    {% endif %}

project_description:
  type: str
  help: One-line description of the project
  default: ""

author_name:
  type: str
  help: Copyright holder / author name (SPDX headers)
  default: Tyler Nivin
  # Non-empty: it's the git identity for the auto-init commit (an empty ident aborts it).
  validator: "{% if not author_name %}author_name cannot be empty.{% endif %}"

author_email:
  type: str
  help: Author email
  default: tyler@nivin.tech
  validator: "{% if not author_email %}author_email cannot be empty.{% endif %}"

repo_owner:
  type: str
  help: GitHub owner (user/org login) — for CODEOWNERS and the repo links in SECURITY/CONTRIBUTING
  default: nivintw
  validator: "{% if not repo_owner %}repo_owner cannot be empty.{% endif %}"

repo_name:
  type: str
  # Decoupled from project_slug on purpose: project_slug is the distribution/package name,
  # which need NOT equal the GitHub repo name. Every github.com/<owner>/<repo> URL is built
  # from repo_owner/repo_name so a repo whose PyPI name ≠ repo name (e.g. dist
  # `digital-ocean-dynamic-dns` living at repo `ddns`) gets correct links with no post-render
  # hand-patching that `copier update` would re-break.
  help: GitHub repository name — for the repo URLs in SECURITY/link-check (defaults to project_slug)
  default: "{{ project_slug }}"
  validator: "{% if not repo_name %}repo_name cannot be empty.{% endif %}"

year:
  type: int
  help: Inception year (SPDX headers)
  default: 2026

license:
  type: str
  help: License (SPDX identifier)
  choices:
    - MIT
    - Apache-2.0
  default: MIT

markdown_has_frontmatter:
  type: bool
  help: >-
    Markdown with YAML frontmatter on line 1 (Claude Code skills/agents/commands,
    Jekyll/Hugo)? If yes, markdown is licensed via REUSE.toml instead of an inline SPDX
    header, which would otherwise be inserted above the frontmatter and break it.
  default: false

initialize_repository:
  type: bool
  # Gates the three repo-initializing _tasks (git init / git add / scaffold commit); the rest
  # (uv sync, prek install) are idempotent and run regardless. Full adoption procedure:
  # docs/adopting-into-an-existing-repo.md.
  help: >-
    Initialize a fresh git repo and make the first commit? Answer NO when adopting into an
    existing repository (it already has git + history).
  default: true

# ----------------------------------------------------------------------------- #
#  Testing & Python shape — three decoupled levers
#    test_frameworks  →  what test suites to scaffold (none / pytest / bats / both)
#    python_source    →  is there a src/<pkg> of Python source code
#    is_package       →  build it as an installable/distributable package
# ----------------------------------------------------------------------------- #
test_frameworks:
  type: str
  help: "Test suites to scaffold (space toggles; none selected = no tests/ dir)"
  multiselect: true
  choices:
    pytest — Python tests: pytest
    bats — shell/Bash tests: bats
  default:
    - pytest

contains_python:
  type: bool
  help: Does this project contain Python? (forced yes when pytest is selected)
  default: "{{ 'pytest' in test_frameworks }}"

# Hidden, computed guard: true if Python is present for ANY reason. Everything Python
# in the template gates on this (so a stray contains_python=no can't drop pytest's deps).
has_python:
  type: bool
  when: false
  default: "{{ contains_python or ('pytest' in test_frameworks) }}"

python_source:
  type: bool
  help: "Python source code? (src/<package> layout) — No = tooling/tests only, like dotfiles"
  # Default tracks has_python: a skipped question still resolves its default, so this must
  # be false when there's no Python (else the src/ dir, gated on python_source, would render).
  default: "{{ has_python }}"
  when: "{{ has_python }}"

is_package:
  type: bool
  help: Build as an installable/distributable package? (adds build-system + dist metadata)
  # Likewise tracks python_source so non-source repos don't inherit package metadata.
  default: "{{ python_source }}"
  when: "{{ python_source }}"

publish_to_pypi:
  type: bool
  help: Emit a PyPI publish workflow (fires on each GitHub Release, OIDC Trusted Publishing)?
  # Only meaningful for an installable dist, so it tracks (and is asked only when) is_package.
  default: "{{ is_package }}"
  when: "{{ is_package }}"

python_package:
  type: str
  help: Python import package name
  default: "{{ project_slug | replace('-', '_') }}"
  when: "{{ python_source }}"
  # Must be a valid Python identifier: it's used as the src/<pkg> directory name and
  # spliced unquoted into `import <pkg>` (e.g. the publish.yml smoke job) — an invalid
  # identifier here isn't just cosmetic, it's a guaranteed SyntaxError on every run.
  validator: >-
    {% if not python_package %}python_package cannot be empty.
    {% elif not (python_package | regex_search('^[a-zA-Z_][a-zA-Z0-9_]*$')) %}
    python_package must be a valid Python identifier: start with a letter or underscore,
    then only letters, digits, or underscores (no dashes, dots, or spaces).
    {% elif python_package in ['False', 'None', 'True', 'and', 'as', 'assert', 'async',
    'await', 'break', 'class', 'continue', 'def', 'del', 'elif', 'else', 'except',
    'finally', 'for', 'from', 'global', 'if', 'import', 'in', 'is', 'lambda', 'nonlocal',
    'not', 'or', 'pass', 'raise', 'return', 'try', 'while', 'with', 'yield'] %}
    python_package must not be a Python reserved keyword ("{{ python_package }}").
    {% endif %}

python_version:
  type: str
  help: Minimum Python version (e.g. 3.14)
  default: "3.14"
  when: "{{ has_python }}"
  # MAJOR.MINOR only — it feeds ruff's target-version (py314) and requires-python; a patch
  # component (3.14.2) or a comparator (>=3.14) would render an invalid value.
  validator: >-
    {% if python_version.split('.') | length != 2
       or not (python_version.split('.')[0].isdigit() and python_version.split('.')[1].isdigit()) %}
    python_version must be MAJOR.MINOR, e.g. 3.14.
    {% endif %}

# ----------------------------------------------------------------------------- #
#  Ansible — a first-class cascade, orthogonal to Python (both can be true)
#    contains_ansible  →  has_ansible (hidden guard everything Ansible gates on)
#    ansible_kind      →  collection | role | playbooks (the scaffold shape)
#    publish_to_galaxy →  Galaxy publish workflow (collection/role only)
#  Mirrors the Python cascade above: a hidden computed guard, then the shape, then
#  the publish lever — so the gating is one stable flag and downstream answers collapse
#  cleanly when contains_ansible is no.
# ----------------------------------------------------------------------------- #
contains_ansible:
  type: bool
  help: Does this project contain Ansible content (playbooks, a role, or a collection)?
  default: false

# Hidden, computed guard: true if Ansible is present. Everything Ansible in the template
# gates on this (the has_python analog), so a single flag drives all the path/section gates.
has_ansible:
  type: bool
  when: false
  default: "{{ contains_ansible }}"

ansible_kind:
  type: str
  help: "Ansible content shape — drives the scaffold, testing, and publish path"
  choices:
    collection — galaxy.yml + roles/ + plugins/, publishable to Galaxy: collection
    role — standalone role (tasks/defaults/handlers/meta), publishable to Galaxy: role
    playbooks — operational project (ansible.cfg + inventory/ + playbooks/), not published: playbooks
  default: collection
  when: "{{ has_ansible }}"

# Hidden computed guard for the role-based kinds (collection or role, NOT playbooks). These two
# share a profile — a Galaxy namespace/name, a Molecule scenario, and a Galaxy publish path — so
# every one of those gates reads this single flag instead of repeating the kind check (the same
# move as has_python). Resolves false when Ansible is absent (ansible_kind's skipped default is
# harmless because this is anded with has_ansible).
ansible_role_based:
  type: bool
  when: false
  default: "{{ has_ansible and ansible_kind in ['collection', 'role'] }}"

ansible_namespace:
  type: str
  # Galaxy namespaces/collection names are lowercase, start with a letter, and allow only
  # letters, digits, and underscores (no dashes) — validated below in the project_slug style.
  help: Ansible Galaxy namespace (lowercase; underscores, not dashes)
  default: "{{ repo_owner | lower | replace('-', '_') }}"
  when: "{{ ansible_role_based }}"
  validator: >-
    {% if not ansible_namespace %}ansible_namespace cannot be empty.
    {% elif not (ansible_namespace | regex_search('^[a-z][a-z0-9_]*$')) %}
    ansible_namespace must be lowercase ASCII: start with a letter, then only letters, digits, or
    underscores (no dashes, dots, spaces — Galaxy's namespace rules).
    {% endif %}

ansible_name:
  type: str
  help: "Ansible collection/role name (lowercase; underscores, not dashes)"
  default: "{{ project_slug | replace('-', '_') }}"
  when: "{{ ansible_role_based }}"
  validator: >-
    {% if not ansible_name %}ansible_name cannot be empty.
    {% elif not (ansible_name | regex_search('^[a-z][a-z0-9_]*$')) %}
    ansible_name must be lowercase ASCII: start with a letter, then only letters, digits, or
    underscores (no dashes, dots, spaces — Galaxy's collection/role name rules).
    {% endif %}

publish_to_galaxy:
  type: bool
  # Galaxy has no OIDC Trusted Publishing (unlike PyPI), so the publish workflow needs an
  # ANSIBLE_GALAXY_API_KEY repo secret — see the generated publish-galaxy.yml + README.
  help: Emit a Galaxy publish workflow (fires on each GitHub Release; needs an ANSIBLE_GALAXY_API_KEY secret)?
  # Track the guard like publish_to_pypi tracks is_package: a skipped question still resolves its
  # default, so this MUST be false when there's no publishable Ansible content (else
  # publish-galaxy.yml, gated on publish_to_galaxy, would render into a non-Ansible project).
  default: "{{ ansible_role_based }}"
  when: "{{ ansible_role_based }}"

# ----------------------------------------------------------------------------- #
#  Includable modules — toggle the orthogonal scaffolding you want
# ----------------------------------------------------------------------------- #
include_terraform:
  type: bool
  help: Terraform scaffolding (versions · variables · outputs)
  default: false

include_docker:
  type: bool
  help: Docker scaffolding (Dockerfile + compose)
  default: false

include_helm:
  type: bool
  help: Helm chart scaffolding
  default: false

include_sql:
  type: bool
  help: SQL scaffolding (sqlfluff lint/fix + a dialect-aware .sqlfluff)
  default: false

sql_dialect:
  type: str
  help: SQL dialect — drives .sqlfluff (sqlfluff lints/fixes against it)
  when: "{{ include_sql }}"
  default: sqlite
  choices:
    - ansi
    - athena
    - bigquery
    - clickhouse
    - databricks
    - db2
    - doris
    - duckdb
    - exasol
    - flink
    - greenplum
    - hive
    - impala
    - mariadb
    - materialize
    - mysql
    - oracle
    - postgres
    - redshift
    - snowflake
    - soql
    - sparksql
    - sqlite
    - starrocks
    - teradata
    - trino
    - tsql
    - vertica

sql_use_dbt:
  type: bool
  help: "dbt-templated SQL? Yes → templater=dbt + the templater dep; bring your dbt project & models"
  when: "{{ include_sql }}"
  default: false

include_devcontainer:
  type: bool
  help: Dev Container scaffolding (.devcontainer/devcontainer.json for Codespaces / VS Code)
  default: false
